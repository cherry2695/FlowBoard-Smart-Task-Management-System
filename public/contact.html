<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flowboard | Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-gradient">
      <div class="container align-items-center">
        <a class="navbar-brand fw-bold text-white" href="/">
          <i class="bi bi-kanban-fill me-2"></i>Flowboard
        </a>
        <button class="navbar-toggler btn btn-transparent text-white" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link text-white" href="/#about">About</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="/#features">Features</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="/#working">Working</a></li>
          </ul>
          <div class="d-flex align-items-center">
            <a class="btn btn-outline-primary me-2" href="/login">Login</a>
            <a class="btn btn-primary" href="/signup">Signup</a>
          </div>
        </div>
      </div>
    </nav>

    <section class="page-section py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-8">
            <div class="card rounded-4 shadow-sm p-4 p-md-5">
              <h2 class="fw-bold mb-3">Contact Flowboard</h2>
              <p class="text-muted mb-4">Have questions, feedback, or need support? Reach out and our team will get back to you shortly.</p>
              <form>
                <div class="mb-3">
                  <label class="form-label">Name</label>
                  <input type="text" class="form-control" placeholder="Your name" />
                </div>
                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input type="email" class="form-control" placeholder="you@example.com" />
                </div>
                <div class="mb-3">
                  <label class="form-label">Message</label>
                  <textarea class="form-control" rows="5" placeholder="How can we help?"></textarea>
                </div>
                <button class="btn btn-primary px-4 py-2" type="submit">Send Message</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>

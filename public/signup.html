<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flowboard | Signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="auth-page">
    <nav class="navbar navbar-expand-lg navbar-gradient">
      <div class="container align-items-center">
        <a class="navbar-brand fw-bold text-white" href="/">
          <i class="bi bi-kanban-fill me-2"></i>Flowboard
        </a>
        <button class="navbar-toggler btn btn-transparent text-white" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link text-white" href="/#about">About</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="/#features">Features</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="/#working">Working</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="/contact.html">Contact</a></li>
          </ul>
          <div class="d-flex align-items-center">
            <a class="btn btn-outline-primary me-2" href="/login">Login</a>
            <a class="btn btn-primary" href="/signup">Signup</a>
          </div>
        </div>
      </div>
    </nav>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
          <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
            <div class="card-body p-4 p-md-5">
              <div class="text-center mb-4">
                <h2 class="fw-bold text-primary">Create Your Account</h2>
                <p class="text-muted">Start organizing your work in a smarter way.</p>
              </div>
              <form id="signupForm">
                <div class="mb-3">
                  <label class="form-label">Full Name</label>
                  <input type="text" class="form-control" id="signupFullName" required />
                </div>
                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input type="email" class="form-control" id="signupEmail" required />
                </div>
                <div class="mb-3">
                  <label class="form-label">Password</label>
                  <div class="input-group">
                    <input type="password" class="form-control" id="signupPassword" minlength="6" required />
                    <button class="btn btn-outline-secondary password-toggle" type="button" data-target="signupPassword" aria-label="Toggle password visibility">
                      <i class="bi bi-eye"></i>
                    </button>
                  </div>
                </div>
                <div class="mb-3">
                  <label class="form-label">Confirm Password</label>
                  <div class="input-group">
                    <input type="password" class="form-control" id="signupConfirmPassword" minlength="6" required />
                    <button class="btn btn-outline-secondary password-toggle" type="button" data-target="signupConfirmPassword" aria-label="Toggle password visibility">
                      <i class="bi bi-eye"></i>
                    </button>
                  </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2" id="signupButton">Create Account</button>
              </form>
              <p class="text-center mt-3 mb-0">
                Already have an account?
                <a href="/login" class="text-primary fw-semibold">Login</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
  </body>
</html>

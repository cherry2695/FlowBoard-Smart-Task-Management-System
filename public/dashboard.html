<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flowboard | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-gradient">
      <div class="container align-items-center">
        <a class="navbar-brand fw-bold text-white" href="/">
          <i class="bi bi-kanban-fill me-2"></i>Flowboard
        </a>
        <div class="ms-auto d-flex align-items-center gap-2">
          <a href="/analytics" class="btn btn-sm text-white" style="background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:0.5rem;font-size:0.875rem;" id="analyticsNavLink">
            <i class="bi bi-bar-chart-line me-1"></i>Analytics
          </a>
          <button class="btn btn-light logout-btn" id="logoutButton">Logout</button>
        </div>
      </div>
    </nav>

    <main class="page-section">
    <div class="container py-4">
      <div class="row align-items-center mb-4">
        <div class="col-lg-8">
          <h2 class="fw-bold mb-1">Welcome back, <span id="userName">User</span> 👋</h2>
          <p class="text-muted mb-0">Here is your current task overview.</p>
        </div>
        <div class="col-lg-4 text-lg-end">
          <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#taskModal" id="addTaskButton">
            <i class="bi bi-plus-circle me-2"></i>Add Task
          </button>
        </div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-md-3">
          <div class="card border-0 rounded-4 shadow-sm p-3">
            <p class="text-muted mb-1">Total Tasks</p>
            <h3 class="fw-bold" id="totalTasks">0</h3>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card border-0 rounded-4 shadow-sm p-3">
            <p class="text-muted mb-1">Completed</p>
            <h3 class="fw-bold text-success" id="completedTasks">0</h3>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card border-0 rounded-4 shadow-sm p-3">
            <p class="text-muted mb-1">Pending</p>
            <h3 class="fw-bold text-warning" id="pendingTasks">0</h3>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card border-0 rounded-4 shadow-sm p-3">
            <p class="text-muted mb-1">High Priority</p>
            <h3 class="fw-bold text-danger" id="highPriorityTasks">0</h3>
          </div>
        </div>
      </div>

      <div class="card border-0 rounded-4 shadow-sm p-3 mb-5 dashboard-search-card">
        <div class="row g-3 align-items-center">
          <div class="col-md-7">
            <input type="text" class="form-control" id="searchInput" placeholder="Search tasks by title..." />
          </div>
          <div class="col-md-3">
            <select class="form-select" id="filterSelect">
              <option value="All">All</option>
              <option value="Pending">Pending</option>
              <option value="In Progress">In Progress</option>
              <option value="On hold">On hold</option>
              <option value="Review">Review</option>
              <option value="Completed">Completed</option>
              <option value="High">High</option>
              <option value="Medium">Medium</option>
              <option value="Low">Low</option>
            </select>
          </div>
          <div class="col-md-2">
            <button class="btn btn-outline-primary w-100" id="refreshButton">Refresh</button>
          </div>
        </div>
      </div>

      <div id="tasksLoading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
      </div>
      <div id="tasksContainer" class="row g-4"></div>
    </div>
    </main>

    <div class="modal fade" id="taskModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content rounded-4">
          <div class="modal-header">
            <h5 class="modal-title" id="taskModalTitle">Add Task</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <form id="taskForm">
              <input type="hidden" id="taskId" />
              <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text" class="form-control" id="taskTitle" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control" id="taskDescription" rows="3"></textarea>
              </div>
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Priority</label>
                  <select class="form-select" id="taskPriority">
                    <option>High</option>
                    <option selected>Medium</option>
                    <option>Low</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Due Date</label>
                  <input type="date" class="form-control" id="taskDueDate" required />
                </div>
              </div>
              <div class="mt-3">
                <label class="form-label">Status</label>
                <select class="form-select" id="taskStatus">
                  <option>Pending</option>
                  <option>In Progress</option>
                  <option>On hold</option>
                  <option>Review</option>
                  <option>Completed</option>
                </select>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" form="taskForm" class="btn btn-primary" id="taskSubmitButton">Save Task</button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="deleteModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content rounded-4">
          <div class="modal-header">
            <h5 class="modal-title">Delete Task</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <p>Are you sure you want to delete this task?</p>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-danger" id="confirmDeleteButton">Delete</button>
          </div>
        </div>
      </div>
    </div>

    <footer class="py-4 text-center text-muted">
      <div class="container">
        <p class="mb-0">Flowboard © 2026 · Stay focused, one task at a time.</p>
      </div>
    </footer>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/dashboard.js"></script>
  </body>
</html>
